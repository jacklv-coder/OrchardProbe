name: Compatibility intake report
description: Submit sanitized, unverified observations from an authorized first-party fixture test.
title: "[Compatibility intake]: "
labels:
  - compatibility
body:
  - type: markdown
    attributes:
      value: |
        Compatibility issues are **unverified intake reports**, not support claims. A single user report never creates or upgrades official support, even when the observed behavior is successful.

        Use OrchardProbe's first-party DemoLab fixture whenever possible. If it cannot reproduce the observation, you may describe another original, publicly redistributable first-party fixture; that report remains diagnostic and cannot become Verified compatibility. Do not name or test a proprietary application here. Do not attach or link to IPAs, binaries, raw logs, credentials, or device identifiers.

  - type: checkboxes
    id: authorization
    attributes:
      label: Authorization and first-party scope
      options:
        - label: I own the tested app and device, or I have explicit authorization covering this exact test.
          required: true
        - label: I used OrchardProbe DemoLab wherever it could reproduce the observation; any exception is an original, publicly redistributable first-party fixture explained under limitations.
          required: true
        - label: I understand this report remains unverified until maintainers independently reproduce and sign a test record.
          required: true

  - type: dropdown
    id: observed_result
    attributes:
      label: Unverified observed result
      description: This describes intake only; it is not a compatibility status or proof of plaintext.
      options:
        - Unverified report — expected behavior observed
        - Unverified report — partial or ambiguous behavior observed
        - Unverified report — failure observed
    validations:
      required: true

  - type: dropdown
    id: claim_scope
    attributes:
      label: Unverified claim scope
      description: Keep the observation narrow. An unencrypted development build cannot exercise a protected-to-plaintext transition.
      options:
        - Host parsing only
        - Transport or contained collection only
        - Protected-to-plaintext reconstruction
        - End-to-end export pipeline
    validations:
      required: true

  - type: textarea
    id: source_revisions
    attributes:
      label: Tool and fixture revisions
      description: Provide full commit SHAs. If DemoLab was not used, also provide the public first-party fixture name and revision under limitations.
      placeholder: |
        orchardprobe_commit: 40-character SHA
        demolab_commit: 40-character SHA
        helper_artifact_sha256: SHA-256 or not exercised
    validations:
      required: true

  - type: textarea
    id: device_environment
    attributes:
      label: Sanitized device environment
      description: For a host-only claim, enter not exercised. Otherwise provide only these fields; never include a device identifier, address, username, or proprietary app identifier.
      placeholder: |
        not exercised (for host-only claims), or:
        marketing_model: Apple marketing model, for example iPhone 15 Pro; never a user-assigned device name
        soc_family: public SoC family
        ios_version: major.minor.patch
        ios_build: build number
        jailbreak_or_test_environment: public name
        environment_version: exact version
        root_mode: rootless or rootful
    validations:
      required: true

  - type: input
    id: host
    attributes:
      label: Sanitized host
      description: macOS version and architecture only. Do not include a hostname, username, IP address, or local path.
      placeholder: macOS 15.5; Apple Silicon
    validations:
      required: true

  - type: textarea
    id: capabilities
    attributes:
      label: Negotiated capability IDs
      description: For a host-only claim, enter not exercised. Otherwise use only public, project-defined IDs; do not paste shell output or connection details.
      placeholder: |
        not exercised (for host-only claims), or:
        transport_capability_ids: id.one, id.two
        backend_capability_ids: id.three, id.four
    validations:
      required: true

  - type: textarea
    id: binary_evidence
    attributes:
      label: Per-binary unverified evidence
      description: "One line per fixture Mach-O: relative path, sanitized initial state, evidence level, and unverified outcome. Allowed: metadata, structure, range_hash, known_plaintext. Never use Pass."
      placeholder: |
        DemoLab.app/DemoLab | initial_state: sanitized evidence or unprotected | evidence: known_plaintext | unverified_outcome: expected behavior observed
        DemoLab.app/Frameworks/DemoFramework.framework/DemoFramework | initial_state: unprotected | evidence: structure | unverified_outcome: inconclusive
        DemoLab.app/PlugIns/DemoShareExtension.appex/DemoShareExtension | initial_state: not evaluated | evidence: metadata | unverified_outcome: skipped
    validations:
      required: true

  - type: textarea
    id: plaintext_oracles
    attributes:
      label: Known-plaintext oracle summary
      description: Record only the fixture-relative path, oracle and observed SHA-256, and oracle provenance from the recorded revision. Use unavailable when absent; never paste bytes.
      placeholder: |
        DemoLab.app/DemoLab | oracle_sha256: ... | observed_sha256: ... | source: build from recorded DemoLab commit
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Sanitized reproduction steps
      description: Provide the smallest deterministic reproduction using fixture-relative paths and placeholders. Summarize observations; do not paste raw logs.
      placeholder: |
        1. Build DemoLab at the recorded commit.
        2. Establish the listed transport capability.
        3. Run the narrowly scoped test.
        4. Compare each observed hash with its DemoLab oracle.
        5. Repeat from a clean state.
    validations:
      required: true

  - type: textarea
    id: limitations
    attributes:
      label: Limitations and incomplete coverage
      description: Identify the public fixture when not using DemoLab, skipped binaries, intermittent behavior, missing oracles, and capability constraints using sanitized summaries only.
      placeholder: none, or a concise sanitized explanation
    validations:
      required: true

  - type: checkboxes
    id: redaction
    attributes:
      label: Final redaction check
      options:
        - label: This report and its links contain no UDID, ECID, serial number, IP address, host/device username, credential, token, certificate, or provisioning material.
          required: true
        - label: This report and its links contain no proprietary application name or bundle identifier, IPA, binary content, or third-party artifact.
          required: true
        - label: This report contains no raw or unsanitized logs; commands, paths, and observations are minimal and sanitized.
          required: true
        - label: All posted hashes refer only to DemoLab or another original, redistributable first-party fixture described under limitations.
          required: true
