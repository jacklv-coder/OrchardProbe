name: DemoLab

options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "15.0"

settings:
  base:
    ENABLE_DEBUG_DYLIB: NO
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"
    SWIFT_VERSION: "5.0"

targets:
  DemoFramework:
    type: framework
    platform: iOS
    sources:
      - path: Framework/Sources
      - path: Framework/Headers
        buildPhase: headers
        headerVisibility: public
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.orchardprobe.demolab.framework
        PRODUCT_NAME: DemoFramework
        INFOPLIST_FILE: Framework/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        DEFINES_MODULE: YES
        CLANG_ENABLE_MODULES: YES
        SKIP_INSTALL: YES

  DemoShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.orchardprobe.demolab.share
        PRODUCT_NAME: DemoShareExtension
        INFOPLIST_FILE: ShareExtension/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1,2"

  DemoLab:
    type: application
    platform: iOS
    sources:
      - path: App/Sources
    dependencies:
      - target: DemoFramework
        embed: true
      - target: DemoShareExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.orchardprobe.demolab
        PRODUCT_NAME: DemoLab
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@executable_path/../../Frameworks"
